<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Shorts Generator</title>
    <meta name="description" content="Generate highly engaging shorts and videos effortlessly with AI">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="blob-c"></div>
    <div class="blob-b"></div>

    <main class="glass-container">
        <!-- Header -->
        <header>
            <div class="logo-box">
                <i class="fa-solid fa-wand-magic-sparkles text-gradient"></i>
                <h1 class="text-gradient">AI Shorts Creator</h1>
            </div>
            <p class="subtitle">Turn any idea into a viral masterpiece. Built for mobile-first creators.</p>
        </header>

        <section class="app-layout">
            <!-- Left Panel: Input -->
            <div class="left-panel">
                <div class="input-card">
                    <div class="input-header">
                        <h2><i class="fa-solid fa-gears"></i> Creative Studio</h2>
                    </div>
                    <form id="generate-form">
                        <!-- Duration Choice -->
                        <div class="choice-group">
                            <label><i class="fa-regular fa-clock"></i> Video Duration</label>
                            <div class="segmented-control">
                                <input type="radio" name="duration" value="30" id="dur30">
                                <label for="dur30">30 Seconds</label>
                                <input type="radio" name="duration" value="60" id="dur60" checked>
                                <label for="dur60">60 Seconds</label>
                            </div>
                        </div>

                        <!-- Language Choice -->
                        <div class="choice-group">
                            <label><i class="fa-solid fa-language"></i> Video Language</label>
                            <div class="segmented-control three-way"
                                style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                                <input type="radio" name="language" value="marathi" id="langMar" checked>
                                <label for="langMar">Marathi</label>
                                <input type="radio" name="language" value="english" id="langEng">
                                <label for="langEng">English</label>
                                <input type="radio" name="language" value="hindi" id="langHin">
                                <label for="langHin">Hindi</label>
                                <input type="radio" name="language" value="english-premium" id="langEngPrem">
                                <label for="langEngPrem" style="font-size: 0.8rem;">OpenAI Prem</label>
                                <input type="radio" name="language" value="english-pro" id="langEngPro">
                                <label for="langEngPro" style="font-size: 0.8rem;">OpenAI Pro</label>
                            </div>
                        </div>

                        <!-- Mode Choice -->
                        <div class="choice-group">
                            <label><i class="fa-solid fa-wand-magic-sparkles"></i> Generation Mode</label>
                            <div class="segmented-control">
                                <input type="radio" name="mode" value="topic" id="modeTopic" checked>
                                <label for="modeTopic">Auto Script</label>
                                <input type="radio" name="mode" value="script" id="modeScript">
                                <label for="modeScript">Paste Script</label>
                            </div>
                        </div>

                        <!-- Content Input -->
                        <div class="textarea-wrapper">
                            <textarea id="input_text" name="input_text" required
                                placeholder="E.g., Marathi facts about Indian kings..."></textarea>
                        </div>

                        <!-- Media Source Option -->
                        <div class="options-container">
                            <label class="toggle-switch">
                                <input type="checkbox" id="use_ai_images" name="use_ai_images" checked>
                                <span class="slider round"></span>
                                <span class="label-text"><i class="fa-solid fa-paintbrush"></i> Use DALL-E AI
                                    Images</span>
                            </label>

                            <label class="toggle-switch">
                                <input type="checkbox" id="use_stock_images" name="use_stock_images">
                                <span class="slider round"></span>
                                <span class="label-text"><i class="fa-solid fa-camera"></i> Use Pexels Photos
                                    (Faster)</span>
                            </label>
                        </div>

                        <button type="submit" class="generate-btn" id="generate-btn">
                            <span class="btn-text">Build My Short</span>
                            <i class="fa-solid fa-rocket run-icon"></i>
                            <div class="loader-spinner" id="loader-spinner"></div>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Panel: Output -->
            <div class="right-panel">
                <div class="output-card" id="output-card">
                    <div class="status-overlay" id="status-overlay">
                        <div class="radar-box">
                            <div class="radar"></div>
                            <i class="fa-solid fa-robot floating-robot"></i>
                        </div>
                        <h3 id="status-text">Awaiting Inspiration...</h3>
                        <p id="status-subtext">Choose your settings and hit Build to start the magic.</p>
                        <div id="timer-container" class="timer-container hidden">
                            <i class="fa-regular fa-clock"></i>
                            <span id="timer-value">00:00</span>
                        </div>
                    </div>

                    <!-- Video Result -->
                    <div class="video-result hidden" id="video-result">
                        <div class="video-header">
                            <h2><i class="fa-solid fa-film"></i> Ready for Upload</h2>
                            <div class="time-badge" id="final-time-badge">
                                <i class="fa-regular fa-clock"></i>
                                <span id="final-time-value">00:00</span>
                            </div>
                        </div>

                        <div id="final-script-display" class="final-script-box hidden">
                            <small>Generated Script:</small>
                            <p id="script-used-text"></p>
                        </div>

                        <div class="video-wrapper">
                            <video id="preview-video" controls autoplay loop playsinline>
                                <source src="" type="video/mp4">
                                Your browser doesn't support HTML5 video.
                            </video>
                        </div>
                        <div class="download-actions">
                            <a id="download-btn" class="download-btn" href="#" download>
                                <i class="fa-solid fa-download"></i> Download Video
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>

</html>
